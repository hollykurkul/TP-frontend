<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Pawdessey</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="menu-page">
      <section class="title-section">
        <p class="eyebrow">A text adventure</p>
        <h1>The Pawdessey</h1>
        <p class="subtitle">
          Follow the pawprints into a strange, storybook wilderness.
        </p>
      </section>

      <section class="menu-grid">
        <section id="auth-container" class="menu-panel auth-panel">
          <h2>Log In</h2>

          <form id="loginForm">
            <label for="loginUsername">Username</label>
            <input
              id="loginUsername"
              name="username"
              type="text"
              autocomplete="username"
              required
            />

            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />

            <button class="menu-button" type="submit">Log In</button>
          </form>

          <div class="divider"></div>

          <h2>Register</h2>

          <form id="registerForm">
            <label for="registerUsername">Username</label>
            <input
              id="registerUsername"
              name="username"
              type="text"
              autocomplete="username"
              required
            />

            <label for="registerPassword">Password</label>
            <input
              id="registerPassword"
              name="password"
              type="password"
              autocomplete="new-password"
              required
            />

            <button class="menu-button secondary-button" type="submit">
              Register
            </button>
          </form>
        </section>

        <section id="new-game-container" class="menu-panel action-panel hidden">
          <h2>New Game</h2>
          <p>Begin a fresh adventure from the first trail marker.</p>

          <button id="newGameButton" class="menu-button" type="button">
            Start New Game
          </button>
        </section>

        <section
          id="load-game-container"
          class="menu-panel action-panel hidden"
        >
          <h2>Load Game</h2>
          <p>Return to a saved adventure.</p>

          <div id="saveList" class="save-list">
            <div class="save-slot empty">
              <span>No saves loaded</span>
              <small>Log in to view saved games</small>
            </div>
          </div>

          <button
            id="loadGameButton"
            class="menu-button secondary-button"
            type="button"
            disabled
          >
            Load Selected Game
          </button>
        </section>
      </section>

      <p id="menuMessage" class="status-message" aria-live="polite"></p>
    </main>

    <script src="api.js"></script>
    <script src="menu.js"></script>
  </body>
</html>
