<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Pawdessey Combat</title>
    <link rel="stylesheet" href="combat.css" />
  </head>
  <body>
    <main class="combat-page">
      <section class="combat-header">
        <p class="eyebrow">Combat encounter</p>
        <h1>Enemy</h1>
      </section>

      <section class="combat-arena">
        <article class="fighter-card">
          <div class="avatar-frame">
            <span>Player Avatar</span>
          </div>

          <h2>Adventurer</h2>

          <div class="heart-bar" aria-label="Player health 3 out of 3">
            <span class="heart full"></span>
            <span class="heart full"></span>
            <span class="heart full"></span>
          </div>
        </article>

        <div class="versus">VS</div>

        <article class="fighter-card enemy-card">
          <div class="avatar-frame">
            <span>Enemy Avatar</span>
          </div>

          <h2>Forest Rival</h2>

          <div class="heart-bar" aria-label="Enemy health 2 out of 3">
            <span class="heart full"></span>
            <span class="heart full"></span>
            <span class="heart empty"></span>
          </div>
        </article>
      </section>

      <section class="combat-log">
        <p>The path narrows. Your opponent blocks the way.</p>
      </section>

      <section class="combat-actions">
        <button type="button">Attack</button>
        <button type="button" class="secondary-button">Block</button>
        <button type="button" class="danger-button">Flee</button>
      </section>
    </main>
  </body>
</html>
